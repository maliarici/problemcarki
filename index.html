<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Problem Çarkı</title>
  <link rel="icon" href="./turkey.ico?v=5" type="image/x-icon">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #ffd166, #ef476f 48%, #8338ec);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #222;
      overflow: hidden;
    }

    .container {
      background: rgba(255, 255, 255, 0.92);
      padding: 10px;
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
      max-width: 930px;
      width: 94%;
      max-height: 96vh;
      overflow: hidden;
    }

    .small {
      font-size: 13px;
      opacity: 0.75;
      margin: 0 0 4px;
    }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin: 10px 0;
      overflow: hidden;
    }

    .student-card {
      background: #374151;
      color: white;
      padding: 8px 6px;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: inset 0 0 0 2px #111827;
      min-height: 42px;
    }

    .student-card.selected {
      background: #dc2626;
      color: white;
      box-shadow: inset 0 0 0 4px #450a0a, 0 0 0 2px white;
      transform: scale(0.96);
    }

    #turnBox {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
      color: #222;
    }

    .stage {
      position: relative;
      width: min(72vw, 500px);
      height: min(72vw, 500px);
      margin: 6px auto 10px;
      display: grid;
      place-items: center;
    }

    .pointer {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 48px solid #222;
      z-index: 8;
      filter: drop-shadow(0 4px 3px rgba(0, 0, 0, 0.25));
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transition: transform 4.8s cubic-bezier(.12, .82, .18, 1);
      box-shadow:
        inset 0 0 0 12px rgba(30, 41, 59, 0.9),
        0 14px 35px rgba(0, 0, 0, 0.28);
      background: white;
    }

    .question-zoom {
      position: fixed;
      left: 50vw;
      top: 50vh;
      width: min(58vw, 500px);
      max-height: 84vh;
      min-height: 150px;
      transform: translate(-50%, -50%) scale(0.75);
      opacity: 0;
      z-index: 999;
      pointer-events: none;

      padding: 18px 18px 20px;
      border-radius: 18px;
      overflow: hidden;

      background:
        linear-gradient(135deg, rgba(255,255,255,0.35), transparent 35%),
        repeating-linear-gradient(
          0deg,
          rgba(43, 27, 16, 0.035) 0px,
          rgba(43, 27, 16, 0.035) 2px,
          transparent 2px,
          transparent 6px
        ),
        #f7e7b4;

      border: 5px solid #2b1b10;
      box-shadow:
        0 10px 0 #8b4513,
        0 24px 45px rgba(0, 0, 0, 0.38);

      color: #2b1b10;
      font-family: "Courier New", Courier, monospace;
      line-height: 1.45;
    }

    .question-zoom::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px dashed rgba(43, 27, 16, 0.35);
      border-radius: 12px;
      pointer-events: none;
    }

    .question-zoom.show {
      animation: retroQuestion 0.65s cubic-bezier(.2, .9, .2, 1.2) forwards;
    }

    .question-image {
      position: relative;
      z-index: 2;
      width: auto;
      height: auto;
      max-width: 92%;
      max-height: 34vh;
      object-fit: contain;
      display: block;
      margin: 0 auto 14px;
      border-radius: 14px;
      box-shadow: 0 6px 14px rgba(43, 27, 16, 0.25);
      background: transparent;
    }

    .question-label {
      display: inline-block;
      margin-bottom: 12px;
      padding: 5px 14px;
      border-radius: 999px;
      background: #2b1b10;
      color: #f7e7b4;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 3px 0 rgba(0,0,0,0.25);
    }

    .question-text {
      position: relative;
      z-index: 2;
      font-size: clamp(17px, 1.65vw, 22px);
      line-height: 1.68;
      font-weight: 800;
      letter-spacing: 0.1px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    }

    @keyframes retroQuestion {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.65) rotate(-2deg);
      }

      60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.04) rotate(1deg);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
    }

    .wheel-dim {
      filter: brightness(0.65) blur(1px);
    }

    button {
      border: none;
      background: #222;
      color: white;
      padding: 14px 30px;
      border-radius: 999px;
      font-size: 19px;
      cursor: pointer;
      margin: 6px;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
    }

    button:hover {
      background: #444;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .done-btn {
      background: #15803d;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .done-btn:hover {
      background: #166534;
    }

    .done-btn.visible {
      visibility: visible;
      opacity: 1;
    }

    #questions {
      display: none;
    }

    @media (max-width: 600px) {
      .student-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .question-zoom {
        width: 82vw;
        max-height: 84vh;
        padding: 14px 14px 16px;
      }

      .question-image {
        width: auto;
        height: auto;
        max-width: 90%;
        max-height: 32vh;
        object-fit: contain;
      }

      .question-text {
        font-size: 16px;
        line-height: 1.62;
      }

      .question-label {
        font-size: 12px;
        margin-bottom: 6px;
      }
    }
  </style>
</head>

<body>
  <div id="nameScreen" class="container">
    <h1 style="font-size:26px;margin:4px 0;">Kimler oynuyor?</h1>
    <p class="small">Adınızı seçin.</p>

    <div id="studentChoices" class="student-grid">
      <button type="button" class="student-card" data-name="Bálint" onclick="toggleStudent(this)">Bálint</button>
      <button type="button" class="student-card" data-name="Steven" onclick="toggleStudent(this)">Steven</button>
      <button type="button" class="student-card" data-name="Amirhossein" onclick="toggleStudent(this)">Amirhossein</button>
      <button type="button" class="student-card" data-name="Juliana" onclick="toggleStudent(this)">Juliana</button>
      <button type="button" class="student-card" data-name="Tammo" onclick="toggleStudent(this)">Tammo</button>
      <button type="button" class="student-card" data-name="Büyük Lisa" onclick="toggleStudent(this)">Büyük Lisa</button>
      <button type="button" class="student-card" data-name="Bije" onclick="toggleStudent(this)">Bije</button>
      <button type="button" class="student-card" data-name="Jordan" onclick="toggleStudent(this)">Jordan</button>
      <button type="button" class="student-card" data-name="Küçük Lisa" onclick="toggleStudent(this)">Küçük Lisa</button>
    </div>

    <button type="button" onclick="startGame()">Tamam</button>
  </div>

  <div id="gameScreen" class="container" style="display:none;">
    <div id="turnBox"></div>

    <div id="stage" class="stage">
      <div class="pointer"></div>
      <canvas id="wheel" width="1000" height="1000"></canvas>
      <div id="questionZoom" class="question-zoom"></div>
    </div>

    <div style="position:relative;width:100%;margin-top:6px;height:64px;">
      <button
        type="button"
        id="soundBtn"
        onclick="toggleSound()"
        style="position:absolute;left:18px;bottom:0;width:52px;height:52px;padding:0;border-radius:50%;font-size:22px;background:#1e293b;box-shadow:0 6px 14px rgba(0,0,0,0.22);"
      >🔊</button>

      <div style="display:flex;justify-content:center;">
        <button type="button" id="spinBtn" onclick="spinWheel()">Çevir</button>
      </div>
    </div>

    <button type="button" id="doneBtn" class="done-btn" onclick="removeSelectedQuestion()">Cevap verdim.</button>

    <textarea id="questions">Bir kafede kahve sipariş ettin ama gelen kahve seninki değil. Ne yaparsın?
Arkadaşınla buluşacaksın ama telefonunun şarjı bitti ve adresi bilmiyorsun. Ne yaparsın?
Markette ödeme yapacaksın ama kartın çalışmıyor. Başka kartın/paran da yok. Arkanda uzun bir sıra var. Ne yaparsın? Ne dersin?
Yabancı bir şehirde kayboldun. İnternetin yok ve kimse senin dilini konuşmuyor. Ne yaparsın?
Arkadaşının doğum gününe gidiyorsun ama hediyeyi evde unuttun. Ne yaparsın?
Bir arkadaşın sana yemek yaptı ama yemeği hiç beğenmedin. Ne söylersin, ne yaparsın?
Yemek sipariş ettin ama bir saat oldu, siparişin gelmedi. Çok açsın. Restoranı aradın. Ne dersin? (Diyalog)
Saat 23.30. Komşun yüksek sesle müzik dinliyor ve senin sabah erken dersin/işin var. Ne yaparsın?
Kuaföre gittin, saçını çok kısa kesti ve hiç beğenmedin. Kuaför "Nasıl oldu?" diye sordu. Ne dersin?
Bir arkadaşından kitap ödünç aldın ama yanlışlıkla üzerine kahve döktün. Ne yaparsın?
İnternetten ikinci el bir eşya satın aldın ama bozuk çıktı. Satıcı, mesajlarına cevap vermiyor. Ne yaparsın?
Yanlışlıkla patronuna, ondan şikâyet ettiğin bir mesaj gönderdin. Ne yaparsın?
Uzun bir otobüs yolculuğundasın. Yanındaki kişi kulaklıksız, yüksek sesle video izliyor. Ne yaparsın?
Bir arkadaşın senden sürekli ufak tefek borç para istiyor ama hiç geri ödemiyor. Yine para istedi. Ne dersin?
Kaldığın otelde duştan sadece buz gibi su akıyor. Resepsiyonu aradın. Ne dersin? (Diyalog)
Sosyal medyada çok samimi olmadığın birinin profiline gizlice bakarken (“stalklarken”), yanlışlıkla iki yıl önceki bir fotoğrafını beğendin. Ne yaparsın?</textarea>
  </div>

  <script>
    const WHEEL_COLORS = [
      "#ef4444",
      "#f97316",
      "#eab308",
      "#22c55e",
      "#06b6d4",
      "#3b82f6",
      "#8b5cf6",
      "#d946ef",
      "#ec4899",
      "#14b8a6"
    ];

    const QUESTION_IMAGES = [
      "./kahve.png",
      "./telefon.png",
      "./market.png",
      "./turist.png",
      "./hediye.png",
      "./yemek.png",
      "./siparis.png",
      "./komsu.png",
      "./kuafor.png",
      "./kitap.png",
      "./satici.png",
      "./mesaj.png",
      "./otobus.png",
      "./borc.png",
      "./otel.png",
      "./stalk.png"
    ];

    const imageCache = {};

    QUESTION_IMAGES.forEach(src => {
      const image = new Image();
      image.src = src;
      image.onload = () => drawWheel();
      imageCache[src] = image;
    });

    let questions = [];
    let rotation = 0;
    let spinning = false;
    let selectedIndex = null;
    let audioCtx = null;
    let clickTimer = null;
    let soundEnabled = true;
    let students = [];
    let currentStudentIndex = 0;

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const doneBtn = document.getElementById("doneBtn");
    const questionZoom = document.getElementById("questionZoom");
    const soundBtn = document.getElementById("soundBtn");
    const nameScreen = document.getElementById("nameScreen");
    const gameScreen = document.getElementById("gameScreen");
    const turnBox = document.getElementById("turnBox");

    function toggleStudent(button) {
      button.classList.toggle("selected");
    }

    function startGame() {
      students = Array.from(document.querySelectorAll("#studentChoices .student-card.selected"))
        .map(button => button.dataset.name);

      if (students.length === 0) {
        alert("En az bir öğrenci seç.");
        return;
      }

      questions = document.getElementById("questions").value
        .split("\n")
        .map((q, index) => ({
          text: q.trim(),
          image: QUESTION_IMAGES[index] || ""
        }))
        .filter(q => q.text.length > 0);

      currentStudentIndex = 0;
      selectedIndex = null;
      spinning = false;
      rotation = 0;

      canvas.style.transform = "rotate(0deg)";

      hideZoom();
      doneBtn.classList.remove("visible");
      spinBtn.disabled = questions.length === 0;

      nameScreen.style.display = "none";
      gameScreen.style.display = "block";

      updateTurnBox();
      drawWheel();
    }

    function updateTurnBox() {
      turnBox.textContent = `Sıra: ${students[currentStudentIndex]}`;
    }

    function nextStudent() {
      currentStudentIndex = (currentStudentIndex + 1) % students.length;
      updateTurnBox();
    }

    function syncTextarea() {
      document.getElementById("questions").value = questions.map(q => q.text).join("\n");
    }

    function fitText(text, maxChars) {
      return text.length <= maxChars ? text : text.slice(0, maxChars - 1) + "…";
    }

    function drawHypnosisCenter() {
      const turns = 4.8;
      const maxR = 78;

      ctx.save();
      ctx.lineWidth = 10;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#111";
      ctx.beginPath();

      for (let t = 0; t < Math.PI * 2 * turns; t += 0.045) {
        const r = (t / (Math.PI * 2 * turns)) * maxR;
        const x = Math.cos(t) * r;
        const y = Math.sin(t) * r;

        if (t === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }

      ctx.stroke();

      ctx.strokeStyle = "#facc15";
      ctx.lineWidth = 5;
      ctx.beginPath();

      for (let t = 0; t < Math.PI * 2 * turns; t += 0.045) {
        const r = (t / (Math.PI * 2 * turns)) * maxR;
        const x = Math.cos(t + 0.55) * r;
        const y = Math.sin(t + 0.55) * r;

        if (t === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }

      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, maxR + 8, 0, Math.PI * 2);
      ctx.strokeStyle = "#111";
      ctx.lineWidth = 7;
      ctx.stroke();

      ctx.restore();
    }

    function drawWheel() {
      const size = canvas.width;
      const center = size / 2;
      const radius = center - 18;
      const count = questions.length;

      ctx.clearRect(0, 0, size, size);

      if (count === 0) {
        ctx.save();
        ctx.translate(center, center);

        ctx.beginPath();
        ctx.arc(0, 0, 180, 0, Math.PI * 2);
        ctx.fillStyle = "#22c55e";
        ctx.fill();

        ctx.strokeStyle = "#1e293b";
        ctx.lineWidth = 12;
        ctx.stroke();

        ctx.fillStyle = "white";
        ctx.font = "bold 72px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Bitti!", 0, 0);

        ctx.restore();
        return;
      }

      ctx.save();
      ctx.translate(center, center);

      for (let i = 0; i < count; i++) {
        const start = (i / count) * Math.PI * 2;
        const end = ((i + 1) / count) * Math.PI * 2;
        const mid = start + (end - start) / 2;
        const isSelected = i === selectedIndex;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();

        ctx.fillStyle = isSelected ? "#16a34a" : WHEEL_COLORS[i % WHEEL_COLORS.length];
        ctx.fill();

        ctx.strokeStyle = "#1e293b";
        ctx.lineWidth = isSelected ? 10 : 4;
        ctx.stroke();

        ctx.save();
        ctx.rotate(mid);

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#111827";
        ctx.font = count > 14 ? "bold 17px Arial" : "bold 20px Arial";

        const label = fitText(questions[i].text, count > 14 ? 34 : 44);
        const words = label.split(" ");
        const lines = [];
        let line = "";

        const lineLimit = count > 14 ? 17 : 21;

        words.forEach(word => {
          if ((line + " " + word).trim().length > lineLimit) {
            lines.push(line.trim());
            line = word;
          } else {
            line += " " + word;
          }
        });

        if (line.trim()) {
          lines.push(line.trim());
        }

        const textX = radius * 0.58;
        const lineHeight = count > 14 ? 21 : 25;
        const startY = -((lines.length - 1) * lineHeight) / 2;

        lines.slice(0, 3).forEach((l, index) => {
          ctx.fillText(l, textX, startY + index * lineHeight);
        });

        ctx.restore();
      }

      drawHypnosisCenter();
      ctx.restore();
    }

    function hideZoom() {
      questionZoom.classList.remove("show");
      questionZoom.innerHTML = "";
      canvas.classList.remove("wheel-dim");
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function showQuestionZoom(question) {
      questionZoom.classList.remove("show");

      const imageHTML = question.image
        ? `<img class="question-image" src="${question.image}" alt="Soru görseli" onerror="this.style.display='none'">`
        : "";

      questionZoom.innerHTML = `
        <div class="question-label">SORU</div>
        ${imageHTML}
        <div class="question-text">${escapeHTML(question.text)}</div>
      `;

      canvas.classList.add("wheel-dim");

      void questionZoom.offsetWidth;

      questionZoom.classList.add("show");
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = soundEnabled ? "🔊" : "🔇";
    }

    function initAudio() {
      if (!soundEnabled) return;

      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function tickSound(volume = 0.08, frequency = 780) {
      if (!audioCtx || !soundEnabled) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "square";
      osc.frequency.value = frequency;
      gain.gain.value = volume;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.025);
    }

    function startSpinSound() {
      initAudio();

      let interval = 45;
      let elapsed = 0;

      clearTimeout(clickTimer);

      function loop() {
        tickSound(0.055, 650 + Math.random() * 260);

        elapsed += interval;
        interval = Math.min(230, interval + 6);

        if (elapsed < 4800) {
          clickTimer = setTimeout(loop, interval);
        }
      }

      loop();
    }

    function successSound() {
      if (!audioCtx || !soundEnabled) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(240, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(180, audioCtx.currentTime + 0.08);

      gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.28, audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.22);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.24);
    }

    function stopSpinSound() {
      clearTimeout(clickTimer);
      clickTimer = null;

      tickSound(0.13, 420);

      setTimeout(() => {
        tickSound(0.11, 320);
      }, 90);
    }

    function spinWheel() {
      if (spinning || questions.length === 0) return;

      spinning = true;
      selectedIndex = null;

      spinBtn.disabled = true;
      doneBtn.classList.remove("visible");

      hideZoom();
      drawWheel();
      startSpinSound();

      const count = questions.length;
      const selected = Math.floor(Math.random() * count);

      const slice = 360 / count;
      const selectedMiddle = selected * slice + slice / 2;
      const targetAngle = 270 - selectedMiddle;

      const currentNormalized = ((rotation % 360) + 360) % 360;
      const distance = ((targetAngle - currentNormalized) + 360) % 360;

      rotation += 360 * 7 + distance;

      canvas.style.transform = `rotate(${rotation}deg)`;

      setTimeout(() => {
        stopSpinSound();

        selectedIndex = selected;

        drawWheel();
        showQuestionZoom(questions[selected]);

        spinning = false;
        spinBtn.disabled = true;
        doneBtn.classList.add("visible");
      }, 5000);
    }

    function removeSelectedQuestion() {
      if (selectedIndex === null || !questions[selectedIndex]) return;

      successSound();

      questions.splice(selectedIndex, 1);

      nextStudent();

      selectedIndex = null;

      hideZoom();
      syncTextarea();
      drawWheel();

      doneBtn.classList.remove("visible");
      spinBtn.disabled = questions.length === 0;

      gameScreen.style.display = "block";
      nameScreen.style.display = "none";
    }
  </script>
</body>
</html>
